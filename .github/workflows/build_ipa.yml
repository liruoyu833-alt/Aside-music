name: Build IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 关键：进入子目录执行所有操作
      - name: Write config
        run: |
          cd Aside-music
          echo "${{ secrets.SECRETS_XCCONFIG }}" > Sources/AsideMusic/Secrets.xcconfig

      - name: Chmod
        run: |
          cd Aside-music
          chmod +x build_ipa.sh

      - name: Build
        run: |
          cd Aside-music
          ./build_ipa.sh

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AsideMusic
          path: Aside-music/AsideMusic.ipa
